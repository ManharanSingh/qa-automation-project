name: Ecomerce UI Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r ecommerce-ui-automation-framework/requirement.txt

    - name: Run tests
      run: |
        python -m pytest --html=report.html
