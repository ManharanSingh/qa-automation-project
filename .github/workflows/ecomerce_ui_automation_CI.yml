name: Ecomerce UI Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r Ecommerce_UI_Automation_Framework/requirements.txt

    - name: Run tests
      working-directory: Ecommerce-UI-Automation-Framework
      run: |
        python -m pytest tests --html=reports/report.html
        
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshots
        path: ecommerce-ui-automation-framework/*.png
  
